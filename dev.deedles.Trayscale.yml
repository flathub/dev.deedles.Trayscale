app-id: dev.deedles.Trayscale

runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang

command: trayscale

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --share=ipc
  - --filesystem=/run/tailscale:ro
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.StatusNotifierWatcher
  - --metadata=X-DConf=migrate-path=/dev/deedles/Trayscale/

build-options:
  prepend-path: /usr/lib/sdk/golang/bin

modules:
  - name: trayscale
    buildsystem: simple
    build-commands:
      - ./dist.sh build
      - ./dist.sh install "$FLATPAK_DEST"
      - glib-compile-schemas "$FLATPAK_DEST/share/glib-2.0/schemas"
    sources:
      - type: git
        url: https://github.com/DeedleFake/trayscale
        tag: v0.18.4
        commit: 93d14261143592350091e1abcfcbab5249e7c4d6
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
          version-scheme: semantic
      - type: archive
        url: https://github.com/DeedleFake/trayscale/releases/download/v0.18.4/trayscale-vendor.tar.xz
        sha256: 1e412e209197a56f6bf13b69cc81a60e0e65db265c38f4bf6bdfb4951b18def4
        strip-components: 0
        x-checker-data:
          type: html
          url: https://github.com/DeedleFake/trayscale/releases
          version-pattern: href="/DeedleFake/trayscale/releases/download/(v([\d.]+)/trayscale-vendor.tar.xz"
          url-template: https://github.com/DeedleFake/trayscale/releases/download/$version/trayscale-vendor.tar.xz
