app-id: dev.deedles.Trayscale

runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang

command: trayscale

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --share=ipc
  - --filesystem=/run/tailscale:ro
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.StatusNotifierWatcher
  - --metadata=X-DConf=migrate-path=/dev/deedles/Trayscale/

build-options:
  prepend-path: /usr/lib/sdk/golang/bin

modules:
  - name: trayscale
    buildsystem: simple
    build-commands:
      - go version
      - go env -changed
      - ./dist.sh build
      - ./dist.sh install "$FLATPAK_DEST"
      - glib-compile-schemas "$FLATPAK_DEST/share/glib-2.0/schemas"
    sources:
      - type: git
        url: https://github.com/DeedleFake/trayscale
        tag: v0.18.6
        commit: 9165a882af4ec5d987255fc9258df29f489ad948
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
          version-scheme: semantic
      - type: archive
        url: https://github.com/DeedleFake/trayscale/releases/download/v0.18.6/trayscale-vendor.tar.zst
        sha256: 763ca8af92faf064f4d63a4beba2cdf607c5b1a842372c27f34e35fe6cba020f
        strip-components: 0
