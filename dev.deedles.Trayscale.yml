app-id: dev.deedles.Trayscale

runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang

command: trayscale

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --share=ipc
  - --filesystem=/run/tailscale:ro
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.StatusNotifierWatcher
  - --metadata=X-DConf=migrate-path=/dev/deedles/Trayscale/

build-options:
  prepend-path: /usr/lib/sdk/golang/bin

modules:
  - name: trayscale
    buildsystem: simple
    build-commands:
      - go version
      - go env -changed
      - ./dist.sh build
      - ./dist.sh install "$FLATPAK_DEST"
      - glib-compile-schemas "$FLATPAK_DEST/share/glib-2.0/schemas"
    sources:
      - type: git
        url: https://github.com/DeedleFake/trayscale
        tag: v0.18.8
        commit: 74913bdc622ae36a01543ffa63fd5f6efd7e77b4
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
          version-scheme: semantic
      - type: archive
        url: https://github.com/DeedleFake/trayscale/releases/download/v0.18.8/trayscale-vendor.tar.zst
        sha256: 4e78c74cf451d3683ee53100f90d7d4c3c0e440604bf78bc3dfce7726d4cd523
        strip-components: 0
