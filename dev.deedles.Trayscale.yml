app-id: dev.deedles.Trayscale

runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang

command: trayscale

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --share=ipc
  - --filesystem=/run/tailscale:ro
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.StatusNotifierWatcher
  - --metadata=X-DConf=migrate-path=/dev/deedles/Trayscale/

build-options:
  prepend-path: /usr/lib/sdk/golang/bin

modules:
  - name: trayscale
    buildsystem: simple
    build-commands:
      - go version
      - go env -changed
      - ./dist.sh build
      - ./dist.sh install "$FLATPAK_DEST"
      - glib-compile-schemas "$FLATPAK_DEST/share/glib-2.0/schemas"
    sources:
      - type: git
        url: https://github.com/DeedleFake/trayscale
        tag: v0.18.5
        commit: 67884528db4dcc8c161e0dc6049081a7fd705835
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
          version-scheme: semantic
      - type: archive
        url: https://github.com/DeedleFake/trayscale/releases/download/v0.18.5/trayscale-vendor.tar.zst
        sha256: 9e51bb6d635bca7073d727d0e70ab2808cd990067594a10cf5568c3919a52fce
        strip-components: 0
